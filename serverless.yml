service: canaima-backend

frameworkVersion: "^4"
useDotenv: true

provider:
  name: aws
  runtime: nodejs24.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - '*'
      allowedMethods:
        - '*'
  environment:
    NODE_ENV: ${self:provider.stage}
    # Existing tables
    TABLE_CLIENTS: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
    TABLE_CREDIT_NOTES: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
    TABLE_PAYMENTS: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
    TABLE_METRICS: ${env:TABLE_METRICS_BASE, 'metrics'}-${self:provider.stage}
    # New tables
    TABLE_ORGANIZATIONS: ${env:TABLE_ORGANIZATIONS_BASE, 'organizations'}-${self:provider.stage}
    TABLE_USERS: ${env:TABLE_USERS_BASE, 'users'}-${self:provider.stage}
    TABLE_WEBHOOK_EVENTS: ${env:TABLE_WEBHOOK_EVENTS_BASE, 'webhook-events'}-${self:provider.stage}
    # Credit note timezone (default: Venezuela)
    CREDIT_NOTE_TIMEZONE: ${env:CREDIT_NOTE_TIMEZONE, 'America/Caracas'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ClientsTable.Arn
            - !Sub "${ClientsTable.Arn}/index/*"
            - !GetAtt CreditNotesTable.Arn
            - !Sub "${CreditNotesTable.Arn}/index/*"
            - !GetAtt PaymentsTable.Arn
            - !Sub "${PaymentsTable.Arn}/index/*"
            - !GetAtt MetricsTable.Arn
            - !Sub "${MetricsTable.Arn}/index/*"
            - !GetAtt OrganizationsTable.Arn
            - !Sub "${OrganizationsTable.Arn}/index/*"
            - !GetAtt UsersTable.Arn
            - !Sub "${UsersTable.Arn}/index/*"
            - !GetAtt WebhookEventsTable.Arn
            - !Sub "${WebhookEventsTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-calculateCreditUsageEvent*"
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration*"
        - Effect: Allow
          Action:
            - lambda:GetFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration*"
        - Effect: Allow
          Action:
            - events:PutRule
            - events:DeleteRule
            - events:PutTargets
            - events:RemoveTargets
          Resource:
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${AWS::StackName}-*"
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/cn-*"

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node24
    platform: node

package:
  individually: true

functions:
  # Hello endpoint
  hello:
    handler: src/functions/hello/handler.main
    events:
      - httpApi:
          path: /hello
          method: GET

  # ===== Clients endpoints =====
  listClients:
    handler: src/functions/clients/handler.listClients
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: GET

  getClient:
    handler: src/functions/clients/handler.getClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: GET

  createClient:
    handler: src/functions/clients/handler.createClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: POST

  updateClient:
    handler: src/functions/clients/handler.updateClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: PUT

  deleteClient:
    handler: src/functions/clients/handler.deleteClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: DELETE

  bulkImportClients:
    handler: src/functions/clients/handler.bulkImportClients
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/bulk-import
          method: POST

  # ===== Credit Notes endpoints =====
  listCreditNotes:
    handler: src/functions/credit-notes/handler.listCreditNotes
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: GET

  getCreditNote:
    handler: src/functions/credit-notes/handler.getCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: GET

  createCreditNote:
    handler: src/functions/credit-notes/handler.createCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: POST

  updateCreditNote:
    handler: src/functions/credit-notes/handler.updateCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: PUT

  deleteCreditNote:
    handler: src/functions/credit-notes/handler.deleteCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: DELETE

  # ===== Credit Notes Expiration Handler =====
  processCreditNoteExpiration:
    handler: src/functions/credit-notes/expiration/handler.processCreditNoteExpiration

  # ===== Payments endpoints =====
  listPayments:
    handler: src/functions/payments/handler.listPayments
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: GET

  getPayment:
    handler: src/functions/payments/handler.getPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: GET

  createPayment:
    handler: src/functions/payments/handler.createPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: POST

  updatePayment:
    handler: src/functions/payments/handler.updatePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: PUT

  deletePayment:
    handler: src/functions/payments/handler.deletePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: DELETE

  # ===== Credit Usage calculation =====
  calculateCreditUsageScheduled:
    handler: src/functions/credit-usage/handler.scheduleHandler
    events:
      - schedule:
          rate: cron(0 0 * * ? *)
          input:
            orgIds: ${env:ORG_IDS, 'org-default'}

  calculateCreditUsageEvent:
    handler: src/functions/credit-usage/handler.eventDrivenHandler

  # ===== Organizations endpoints =====
  listUserOrganizations:
    handler: src/functions/organizations/handler.listUserOrganizations
    events:
      - httpApi:
          path: /users/me/organizations
          method: GET

  getOrganization:
    handler: src/functions/organizations/handler.getOrganization
    events:
      - httpApi:
          path: /organizations/{orgId}
          method: GET

  createOrganization:
    handler: src/functions/organizations/handler.createOrganization
    events:
      - httpApi:
          path: /organizations
          method: POST

  updateOrganization:
    handler: src/functions/organizations/handler.updateOrganization
    events:
      - httpApi:
          path: /organizations/{orgId}
          method: PATCH

  listOrganizationMembers:
    handler: src/functions/organizations/handler.listOrganizationMembers
    events:
      - httpApi:
          path: /organizations/{orgId}/members
          method: GET

  # ===== Users endpoints =====
  getCurrentUser:
    handler: src/functions/users/handler.getCurrentUser
    events:
      - httpApi:
          path: /users/me
          method: GET

  updateCurrentUser:
    handler: src/functions/users/handler.updateCurrentUser
    events:
      - httpApi:
          path: /users/me
          method: PATCH

  getUser:
    handler: src/functions/users/handler.getUser
    events:
      - httpApi:
          path: /users/{userId}
          method: GET

  # ===== Webhooks =====
  clerkWebhook:
    handler: src/functions/webhooks/clerk/handler.main
    events:
      - httpApi:
          path: /webhooks/clerk
          method: POST

resources:
  Resources:
    # ===== Existing Tables =====
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: emailLower
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: emailIndex
            KeySchema:
              - AttributeName: emailLower
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    PaymentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
          - AttributeName: creditNoteIdGSI
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: methodGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: creditNoteIdIndex
            KeySchema:
              - AttributeName: creditNoteIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: methodIndex
            KeySchema:
              - AttributeName: methodGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    CreditNotesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    MetricsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_METRICS_BASE, 'metrics'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    # ===== New Tables =====
    OrganizationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_ORGANIZATIONS_BASE, 'organizations'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_USERS_BASE, 'users'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    WebhookEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_WEBHOOK_EVENTS_BASE, 'webhook-events'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # ===== EventBridge IAM Role =====
    EventBridgeInvokeLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: InvokeCreditNoteExpirationLambda
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                  Resource:
                    - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration'
