service: canaima-backend

frameworkVersion: "^4"
useDotenv: true

custom:
  stages:
    dev:
      region: us-west-2
      domainName: api-dev.canaimacredito.com
      certificateArn: arn:aws:acm:us-west-2:503561456281:certificate/b409fc71-c521-4f9a-a9e2-341a5f8082e6
    prod:
      region: us-east-1
      domainName: api.canaimacredito.com
      certificateArn: arn:aws:acm:us-east-1:503561456281:certificate/373e4914-b16c-4fe8-8d02-0648fcd6625a

provider:
  name: aws
  runtime: nodejs24.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  region: ${self:custom.stages.${self:provider.stage}.region}
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - '*'
      allowedMethods:
        - '*'
    authorizers:
      clerkAuthorizer:
        type: request
        functionName: clerkAuthorizer
        enableSimpleResponses: true
        identitySource:
          - $request.header.Authorization
  environment:
    NODE_ENV: ${self:provider.stage}
    # Existing tables
    TABLE_CLIENTS: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
    TABLE_CREDIT_NOTES: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
    TABLE_PAYMENTS: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
    TABLE_METRICS: ${env:TABLE_METRICS_BASE, 'metrics'}-${self:provider.stage}
    # New tables
    TABLE_ORGANIZATIONS: ${env:TABLE_ORGANIZATIONS_BASE, 'organizations'}-${self:provider.stage}
    TABLE_USERS: ${env:TABLE_USERS_BASE, 'users'}-${self:provider.stage}
    TABLE_WEBHOOK_EVENTS: ${env:TABLE_WEBHOOK_EVENTS_BASE, 'webhook-events'}-${self:provider.stage}
    TABLE_AUDIT_LOGS: ${env:TABLE_AUDIT_LOGS_BASE, 'audit-logs'}-${self:provider.stage}
    # Credit note timezone (default: Venezuela)
    CREDIT_NOTE_TIMEZONE: ${env:CREDIT_NOTE_TIMEZONE, 'America/Caracas'}
    # Clerk authentication
    CLERK_JWKS_URL: ${env:CLERK_JWKS_URL, 'https://live-spaniel-88.clerk.accounts.dev/.well-known/jwks.json'}
    CLERK_ISSUER: ${env:CLERK_ISSUER, 'https://live-spaniel-88.clerk.accounts.dev'}
    CLERK_WEBHOOK_SECRET: ${env:CLERK_WEBHOOK_SECRET, 'whsec_e8xKTyG00ObEUVhEI7waMxiinf7ylrWh'}
    # Clerk Backend API key (for updating organizations in Clerk)
    CLERK_SECRET_KEY: ${env:CLERK_SECRET_KEY, 'sk_test_JbLIXqTkc1hZIqMnLS9eIWQBBC4sStIrNGHsF6sQnY'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:BatchGetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ClientsTable.Arn
            - !Sub "${ClientsTable.Arn}/index/*"
            - !GetAtt CreditNotesTable.Arn
            - !Sub "${CreditNotesTable.Arn}/index/*"
            - !GetAtt PaymentsTable.Arn
            - !Sub "${PaymentsTable.Arn}/index/*"
            - !GetAtt MetricsTable.Arn
            - !Sub "${MetricsTable.Arn}/index/*"
            - !GetAtt OrganizationsTable.Arn
            - !Sub "${OrganizationsTable.Arn}/index/*"
            - !GetAtt UsersTable.Arn
            - !Sub "${UsersTable.Arn}/index/*"
            - !GetAtt WebhookEventsTable.Arn
            - !Sub "${WebhookEventsTable.Arn}/index/*"
            - !GetAtt AuditLogsTable.Arn
            - !Sub "${AuditLogsTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-calculateCreditUsageEvent*"
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration*"
        - Effect: Allow
          Action:
            - lambda:GetFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration*"
        - Effect: Allow
          Action:
            - events:PutRule
            - events:DeleteRule
            - events:PutTargets
            - events:RemoveTargets
            - events:PutEvents
          Resource:
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${AWS::StackName}-*"
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/cn-*"
            - "*" # PutEvents doesn't use resource ARNs
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt MetricsQueue.Arn
            - !GetAtt ClientDelinquencyCheckQueue.Arn
        - Effect: Allow
          Action:
            - iam:PassRole
          Resource:
            - !GetAtt EventBridgeInvokeLambdaRole.Arn
            - !Sub "arn:aws:iam::${AWS::AccountId}:role/${AWS::StackName}-EventBridgeInvokeLambdaRole"
        - Effect: Allow
          Action:
            - iam:GetRole
          Resource:
            - !GetAtt EventBridgeInvokeLambdaRole.Arn
            - !Sub "arn:aws:iam::${AWS::AccountId}:role/${AWS::StackName}-EventBridgeInvokeLambdaRole"

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    target: node24
    platform: node
    external:
      - '@aws-sdk/*'

package:
  individually: true

functions:
  # ===== Clerk JWT Authorizer =====
  clerkAuthorizer:
    handler: src/functions/shared/clerk-authorizer.handler

  # Hello endpoint (public - no auth)
  hello:
    handler: src/functions/hello/handler.main
    events:
      - httpApi:
          path: /hello
          method: GET

  # ===== Clients endpoints =====
  listClients:
    handler: src/functions/clients/handler.listClients
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: GET
          authorizer:
            name: clerkAuthorizer

  getClient:
    handler: src/functions/clients/handler.getClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: GET
          authorizer:
            name: clerkAuthorizer

  createClient:
    handler: src/functions/clients/handler.createClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: POST
          authorizer:
            name: clerkAuthorizer

  updateClient:
    handler: src/functions/clients/handler.updateClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: PUT
          authorizer:
            name: clerkAuthorizer

  deleteClient:
    handler: src/functions/clients/handler.deleteClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: DELETE
          authorizer:
            name: clerkAuthorizer

  bulkImportClients:
    handler: src/functions/clients/handler.bulkImportClients
    memorySize: 512
    timeout: 30
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/bulk-import
          method: POST
          authorizer:
            name: clerkAuthorizer

  # ===== Credit Notes endpoints =====
  listCreditNotes:
    handler: src/functions/credit-notes/handler.listCreditNotes
    timeout: 29
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: GET
          authorizer:
            name: clerkAuthorizer

  getCreditNote:
    handler: src/functions/credit-notes/handler.getCreditNote
    timeout: 29
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: GET
          authorizer:
            name: clerkAuthorizer

  createCreditNote:
    handler: src/functions/credit-notes/handler.createCreditNote
    timeout: 29
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: POST
          authorizer:
            name: clerkAuthorizer

  updateCreditNote:
    handler: src/functions/credit-notes/handler.updateCreditNote
    timeout: 29
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: PUT
          authorizer:
            name: clerkAuthorizer

  deleteCreditNote:
    handler: src/functions/credit-notes/handler.deleteCreditNote
    timeout: 29
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: DELETE
          authorizer:
            name: clerkAuthorizer

  # ===== DEBUG/TEST Endpoints for Credit Note Expiration =====
  checkExpirationManual:
    handler: src/functions/credit-notes/handler.checkExpirationManual
    timeout: 10
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}/manual-check-expiration
          method: POST
          authorizer:
            name: clerkAuthorizer

  getExpirationRuleStatus:
    handler: src/functions/credit-notes/handler.getExpirationRuleStatus
    timeout: 10
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}/expiration-rule-status
          method: GET
          authorizer:
            name: clerkAuthorizer

  # ===== Credit Notes Expiration Handler =====
  processCreditNoteExpiration:
    handler: src/functions/credit-notes/expiration/handler.processCreditNoteExpiration

  # ===== Payments endpoints =====
  listPayments:
    handler: src/functions/payments/handler.listPayments
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: GET
          authorizer:
            name: clerkAuthorizer

  getPayment:
    handler: src/functions/payments/handler.getPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: GET
          authorizer:
            name: clerkAuthorizer

  createPayment:
    handler: src/functions/payments/handler.createPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: POST
          authorizer:
            name: clerkAuthorizer

  updatePayment:
    handler: src/functions/payments/handler.updatePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: PUT
          authorizer:
            name: clerkAuthorizer

  deletePayment:
    handler: src/functions/payments/handler.deletePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: DELETE
          authorizer:
            name: clerkAuthorizer

  # ===== Credit Usage event-driven calculation =====
  calculateCreditUsageEvent:
    handler: src/functions/credit-usage/handler.eventDrivenHandler

  # ===== Daily Metrics Processing (midnight Venezuela = 4 AM UTC) =====
  dailyMetricsScheduled:
    handler: src/functions/daily-metrics/handler.dailyMetricsHandler
    memorySize: 512
    timeout: 60
    events:
      - schedule:
          rate: cron(0 4 * * ? *)
          input:
            orgIds: ${env:ORG_IDS, 'org-default'}

  # ===== Unified Metrics SQS Consumer =====
  calculateMetrics:
    handler: src/functions/credit-usage/metrics-handler.calculateMetrics
    memorySize: 512
    timeout: 30
    events:
      - sqs:
          arn: !GetAtt MetricsQueue.Arn
          batchSize: 10

  # ===== Organizations endpoints =====
  listUserOrganizations:
    handler: src/functions/organizations/handler.listUserOrganizations
    events:
      - httpApi:
          path: /users/me/organizations
          method: GET
          authorizer:
            name: clerkAuthorizer

  getOrganization:
    handler: src/functions/organizations/handler.getOrganization
    events:
      - httpApi:
          path: /organizations/{orgId}
          method: GET
          authorizer:
            name: clerkAuthorizer

  createOrganization:
    handler: src/functions/organizations/handler.createOrganization
    events:
      - httpApi:
          path: /organizations
          method: POST
          authorizer:
            name: clerkAuthorizer

  updateOrganization:
    handler: src/functions/organizations/handler.updateOrganization
    events:
      - httpApi:
          path: /organizations/{orgId}
          method: PATCH
          authorizer:
            name: clerkAuthorizer

  listOrganizationMembers:
    handler: src/functions/organizations/handler.listOrganizationMembers
    events:
      - httpApi:
          path: /organizations/{orgId}/members
          method: GET
          authorizer:
            name: clerkAuthorizer

  completeOrganizationOnboarding:
    handler: src/functions/organizations/handler.completeOnboarding
    events:
      - httpApi:
          path: /organizations/{orgId}/complete-onboarding
          method: POST
          authorizer:
            name: clerkAuthorizer

  # ===== Audit Logs endpoints =====
  listAuditLogs:
    handler: src/functions/audit-logs/handler.listAuditLogs
    events:
      - httpApi:
          path: /orgs/{orgId}/audit-logs
          method: GET
          authorizer:
            name: clerkAuthorizer

  # ===== Dashboard Metrics endpoint =====
  getDashboardMetrics:
    handler: src/functions/dashboard-metrics/handler.getDashboardMetrics
    events:
      - httpApi:
          path: /orgs/{orgId}/dashboard-metrics
          method: GET
          authorizer:
            name: clerkAuthorizer

  # ===== Users endpoints =====
  getCurrentUser:
    handler: src/functions/users/handler.getCurrentUser
    events:
      - httpApi:
          path: /users/me
          method: GET
          authorizer:
            name: clerkAuthorizer

  updateCurrentUser:
    handler: src/functions/users/handler.updateCurrentUser
    events:
      - httpApi:
          path: /users/me
          method: PATCH
          authorizer:
            name: clerkAuthorizer

  getUser:
    handler: src/functions/users/handler.getUser
    events:
      - httpApi:
          path: /users/{userId}
          method: GET

  # ===== Webhooks (public - no auth, uses Svix verification) =====
  clerkWebhook:
    handler: src/functions/webhooks/clerk/handler.main
    events:
      - httpApi:
          path: /webhooks/clerk
          method: POST

  # ===== Client Delinquency Check =====
  checkClientDelinquency:
    handler: src/functions/credit-notes/client-delinquency-check.checkClientDelinquency
    events:
      - sqs:
          arn: !GetAtt ClientDelinquencyCheckQueue.Arn
          batchSize: 10

resources:
  Resources:
    # ===== Existing Tables =====
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: emailLower
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: emailIndex
            KeySchema:
              - AttributeName: emailLower
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    PaymentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
          - AttributeName: creditNoteIdGSI
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: methodGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: creditNoteIdIndex
            KeySchema:
              - AttributeName: creditNoteIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: methodIndex
            KeySchema:
              - AttributeName: methodGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    CreditNotesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    MetricsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_METRICS_BASE, 'metrics'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    # ===== New Tables =====
    OrganizationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_ORGANIZATIONS_BASE, 'organizations'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_USERS_BASE, 'users'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    WebhookEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_WEBHOOK_EVENTS_BASE, 'webhook-events'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    AuditLogsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_AUDIT_LOGS_BASE, 'audit-logs'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: orgId
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
        KeySchema:
          - AttributeName: orgId
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: byUser
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # ===== SQS Queue for Metrics Calculations =====
    MetricsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-metrics-queue
        VisibilityTimeout: 300 # 5 minutes for Lambda timeout
        MessageRetentionPeriod: 1209600 # 14 days
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt MetricsDLQ.Arn
          maxReceiveCount: 3

    MetricsDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-metrics-dlq
        MessageRetentionPeriod: 1209600 # 14 days

    # ===== EventBridge IAM Role for sending to Metrics SQS Queue =====
    EventBridgeToMetricsQueueRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: SendToMetricsQueue
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource: !GetAtt MetricsQueue.Arn

    # ===== EventBridge Rule: Route all metrics events to SQS =====
    MetricsEventRule:
      Type: AWS::Events::Rule
      Properties:
        EventBusName: default
        Name: ${self:service}-${self:provider.stage}-metrics-rule
        Description: Route all metrics calculation events (credit usage, credit notes, and CRUD events) to SQS
        EventPattern:
          source:
            - canaima.metrics
            - canaima.crud
          detail-type:
            - CreditUsageCalculationRequested
            - CreditNoteMetricsUpdateRequested
            - CreditNoteCreated
            - CreditNoteUpdated
            - CreditNoteDeleted
            - PaymentCreated
            - PaymentUpdated
            - PaymentDeleted
        State: ENABLED
        Targets:
          - Arn: !GetAtt MetricsQueue.Arn
            RoleArn: !GetAtt EventBridgeToMetricsQueueRole.Arn
            Id: MetricsQueueTarget

    # ===== SQS Queue for Client Delinquency Checks =====
    ClientDelinquencyCheckQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-client-delinquency-check-queue
        VisibilityTimeout: 300 # 5 minutes for Lambda timeout
        MessageRetentionPeriod: 1209600 # 14 days
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ClientDelinquencyCheckDLQ.Arn
          maxReceiveCount: 3

    ClientDelinquencyCheckDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-client-delinquency-check-dlq
        MessageRetentionPeriod: 1209600 # 14 days

    # ===== EventBridge IAM Role for sending to Client Delinquency Check Queue =====
    EventBridgeToClientDelinquencyQueueRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: SendToClientDelinquencyCheckQueue
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource: !GetAtt ClientDelinquencyCheckQueue.Arn

    # ===== EventBridge Rule: Route events to client status check (delinquency/solvency) =====
    ClientStatusCheckRule:
      Type: AWS::Events::Rule
      Properties:
        EventBusName: default
        Name: ${self:service}-${self:provider.stage}-client-status-check-rule
        Description: Route events that require checking if client is delinquent or solvent
        EventPattern:
          source:
            - canaima.crud
          detail-type:
            - CreditNoteDeleted
            - CreditNotePaid
            - PaymentCreated
            - PaymentUpdated
            - PaymentDeleted
        State: ENABLED
        Targets:
          - Arn: !GetAtt ClientDelinquencyCheckQueue.Arn
            RoleArn: !GetAtt EventBridgeToClientDelinquencyQueueRole.Arn
            Id: ClientStatusCheckQueueTarget

    # ===== EventBridge IAM Role for Lambda invocation =====
    EventBridgeInvokeLambdaRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: !Sub "${AWS::StackName}-EventBridgeInvokeLambdaRole"
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: InvokeCreditNoteExpirationLambda
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                  Resource:
                    - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-processCreditNoteExpiration'

    # ===== API Gateway Custom Domain =====
    ApiGatewayCustomDomain:
      Type: AWS::ApiGatewayV2::DomainName
      Properties:
        DomainName: ${self:custom.stages.${self:provider.stage}.domainName}
        DomainNameConfigurations:
          - CertificateArn: ${self:custom.stages.${self:provider.stage}.certificateArn}
            EndpointType: REGIONAL
            SecurityPolicy: TLS_1_2

    # ===== API Gateway Domain Name Mapping =====
    ApiGatewayDomainMapping:
      Type: AWS::ApiGatewayV2::ApiMapping
      DependsOn: ApiGatewayCustomDomain
      Properties:
        ApiId: !Ref HttpApi
        DomainName: !Ref ApiGatewayCustomDomain
        Stage: $default

  Outputs:
    ApiGatewayDomainName:
      Description: API Gateway Custom Domain Target
      Value: !GetAtt ApiGatewayCustomDomain.RegionalDomainName
