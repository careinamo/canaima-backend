service: canaima-backend

frameworkVersion: "^4"
useDotenv: true

provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    NODE_ENV: ${self:provider.stage}
    TABLE_CLIENTS: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ClientsTable.Arn
            - !Sub "${ClientsTable.Arn}/index/*"

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node24
    platform: node

package:
  individually: true

functions:
  hello:
    handler: src/functions/hello/handler.main
    events:
      - httpApi:
          path: /hello
          method: GET

  listClients:
    handler: src/functions/clients/handler.listClients
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: GET

  getClient:
    handler: src/functions/clients/handler.getClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: GET

  createClient:
    handler: src/functions/clients/handler.createClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: POST

  updateClient:
    handler: src/functions/clients/handler.updateClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: PUT

  deleteClient:
    handler: src/functions/clients/handler.deleteClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: DELETE

resources:
  Resources:
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: emailLower
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: emailIndex
            KeySchema:
              - AttributeName: emailLower
                KeyType: HASH
            Projection:
              ProjectionType: ALL
