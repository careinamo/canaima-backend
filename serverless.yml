service: canaima-backend

frameworkVersion: "^4"
useDotenv: true

provider:
  name: aws
  runtime: nodejs24.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    NODE_ENV: ${self:provider.stage}
    TABLE_CLIENTS: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
    TABLE_CREDIT_NOTES: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
    TABLE_PAYMENTS: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - '*'
      allowedMethods:
        - '*'
      exposedHeaders:
        - '*'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ClientsTable.Arn
            - !Sub "${ClientsTable.Arn}/index/*"
            - !GetAtt CreditNotesTable.Arn
            - !Sub "${CreditNotesTable.Arn}/index/*"
            - !GetAtt PaymentsTable.Arn
            - !Sub "${PaymentsTable.Arn}/index/*"

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node24
    platform: node

package:
  individually: true

functions:
  hello:
    handler: src/functions/hello/handler.main
    events:
      - httpApi:
          path: /hello
          method: GET
          cors: true

  # Clients endpoints
  listClients:
    handler: src/functions/clients/handler.listClients
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: GET
          cors: true

  getClient:
    handler: src/functions/clients/handler.getClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: GET
          cors: true

  createClient:
    handler: src/functions/clients/handler.createClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients
          method: POST
          cors: true

  updateClient:
    handler: src/functions/clients/handler.updateClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: PUT
          cors: true

  deleteClient:
    handler: src/functions/clients/handler.deleteClient
    events:
      - httpApi:
          path: /orgs/{orgId}/clients/{id}
          method: DELETE
          cors: true

  # Credit Notes endpoints
  listCreditNotes:
    handler: src/functions/credit-notes/handler.listCreditNotes
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: GET
          cors: true

  getCreditNote:
    handler: src/functions/credit-notes/handler.getCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: GET
          cors: true

  createCreditNote:
    handler: src/functions/credit-notes/handler.createCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes
          method: POST
          cors: true

  updateCreditNote:
    handler: src/functions/credit-notes/handler.updateCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: PUT
          cors: true

  deleteCreditNote:
    handler: src/functions/credit-notes/handler.deleteCreditNote
    events:
      - httpApi:
          path: /orgs/{orgId}/credit-notes/{id}
          method: DELETE
          cors: true

  # Payments endpoints
  listPayments:
    handler: src/functions/payments/handler.listPayments
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: GET
          cors: true

  getPayment:
    handler: src/functions/payments/handler.getPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: GET
          cors: true

  createPayment:
    handler: src/functions/payments/handler.createPayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments
          method: POST
          cors: true

  updatePayment:
    handler: src/functions/payments/handler.updatePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: PUT
          cors: true

  deletePayment:
    handler: src/functions/payments/handler.deletePayment
    events:
      - httpApi:
          path: /orgs/{orgId}/payments/{id}
          method: DELETE
          cors: true

resources:
  Resources:
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CLIENTS_BASE, 'clients'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: emailLower
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: emailIndex
            KeySchema:
              - AttributeName: emailLower
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    PaymentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_PAYMENTS_BASE, 'payments'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: methodGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: methodIndex
            KeySchema:
              - AttributeName: methodGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    CreditNotesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:TABLE_CREDIT_NOTES_BASE, 'credit-notes'}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: statusGSI
            AttributeType: S
          - AttributeName: clientIdGSI
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: statusIndex
            KeySchema:
              - AttributeName: statusGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: clientIdIndex
            KeySchema:
              - AttributeName: clientIdGSI
                KeyType: HASH
            Projection:
              ProjectionType: ALL
